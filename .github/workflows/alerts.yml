name: stock-alerts
on:
  schedule:
    # Three scans on weekdays: ~open, midday, ~close (US session).
    # 13:30, 17:30, 20:30 UTC. GitHub may delay scheduled runs by several minutes.
    - cron: "30 13,17,20 * * 1-5"
  workflow_dispatch:
    inputs:
      test_email:
        description: "Send a TEST email instead of scanning"
        type: boolean
        default: false
permissions:
  contents: write
concurrency:
  group: stock-alerts
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Scan and alert
        env:
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ "${{ inputs.test_email }}" = "true" ]; then
            python run_alerts.py --test-email
          else
            python run_alerts.py
          fi
      - name: Persist de-dup state
        run: |
          if [ -n "$(git status --porcelain alert_state.json)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add alert_state.json
            git commit -m "Update alert state [skip ci]"
            git push
          else
            echo "No state change."
          fi
